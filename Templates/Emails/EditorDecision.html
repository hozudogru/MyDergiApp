<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
</head>
<body style="margin:0; padding:20px; background:#f3f4f6; font-family:Arial,Helvetica,sans-serif;">
    <div style="max-width:700px; margin:auto; background:#ffffff; border-radius:12px; border:1px solid #e5e7eb; overflow:hidden;">

        <div style="background:#0d6efd; color:white; padding:24px;">
            <h2 style="margin:0;">Makale Kararı</h2>
        </div>

        <div style="padding:24px; line-height:1.7; color:#1f2937;">
            <p>Sayın <strong>{{AuthorName}}</strong>,</p>

            <p>
                <strong>{{SubmissionTitle}}</strong> başlıklı makaleniz için editör kararı verilmiştir.
            </p>

            <div style="background:#f9fafb; border:1px solid #e5e7eb; border-radius:10px; padding:16px; margin:20px 0;">
                <p style="margin:0 0 8px 0;"><strong>Karar:</strong> {{Decision}}</p>
                <p style="margin:0;"><strong>Editör Notu:</strong> {{DecisionNote}}</p>
            </div>

            <p>İlginiz için teşekkür ederiz.</p>
        </div>

        <div style="padding:16px; font-size:12px; color:#6b7280; border-top:1px solid #e5e7eb;">
            Bu e-posta otomatik olarak gönderilmiştir.
        </div>
    </div>
</body>
</html>
