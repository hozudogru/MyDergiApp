name: Deploy MyDergiApp

on:
  push:
    branches:
      - main

concurrency:
  group: mydergiapp-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: .NET 8 kur
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Proje dosyasını bul
        run: |
          pwd
          ls -la
          find . -name "*.csproj"

      - name: Restore
        run: dotnet restore ./MyDergiApp.csproj

      - name: Build
        run: dotnet build ./MyDergiApp.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ./MyDergiApp.csproj -c Release -o ./publish

      - name: Publish çıktısını paketle
        run: |
          cd publish
          tar -czf ../mydergiapp.tar.gz .

      - name: Sunucuda geçici klasörü hazırla
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          script: |
            set -e
            mkdir -p /tmp/mydergiapp_deploy
            rm -f /tmp/mydergiapp_deploy/mydergiapp.tar.gz

      - name: Paketi sunucuya yükle
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          source: "mydergiapp.tar.gz"
          target: "/tmp/mydergiapp_deploy"

      - name: Canlıya al ve servisi yeniden başlat
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          script: |
            set -e

            APP_DIR="/var/www/mydergiapp"
            TMP_DIR="/tmp/mydergiapp_deploy"
            BACKUP_DIR="/tmp/mydergiapp_backup"

            mkdir -p "$APP_DIR"
            mkdir -p "$APP_DIR/wwwroot/uploads"
            rm -rf "$BACKUP_DIR"
            mkdir -p "$BACKUP_DIR"

            # config ve upload klasörünü koru
            if [ -f "$APP_DIR/appsettings.json" ]; then
              cp "$APP_DIR/appsettings.json" "$BACKUP_DIR/appsettings.json"
            fi

            if [ -f "$APP_DIR/appsettings.Production.json" ]; then
              cp "$APP_DIR/appsettings.Production.json" "$BACKUP_DIR/appsettings.Production.json"
            fi

            if [ -d "$APP_DIR/wwwroot/uploads" ]; then
              cp -r "$APP_DIR/wwwroot/uploads" "$BACKUP_DIR/uploads"
            fi

            # eski dosyaları temizle
            rm -rf "$APP_DIR"/*

            # yeni publish dosyalarını aç
            tar -xzf "$TMP_DIR/mydergiapp.tar.gz" -C "$APP_DIR"

            # korunan dosyaları geri koy
            if [ -f "$BACKUP_DIR/appsettings.json" ]; then
              cp "$BACKUP_DIR/appsettings.json" "$APP_DIR/appsettings.json"
            fi

            if [ -f "$BACKUP_DIR/appsettings.Production.json" ]; then
              cp "$BACKUP_DIR/appsettings.Production.json" "$APP_DIR/appsettings.Production.json"
            fi

            mkdir -p "$APP_DIR/wwwroot/uploads"

            if [ -d "$BACKUP_DIR/uploads" ]; then
              cp -r "$BACKUP_DIR/uploads/." "$APP_DIR/wwwroot/uploads/" || true
            fi

            chown -R root:root "$APP_DIR"
            chmod -R 755 "$APP_DIR"
            chmod -R 775 "$APP_DIR/wwwroot/uploads"

            systemctl daemon-reload
            systemctl restart MyDergiApp
            systemctl status MyDergiApp --no-pager -l

            rm -rf "$TMP_DIR"
            rm -rf "$BACKUP_DIR"