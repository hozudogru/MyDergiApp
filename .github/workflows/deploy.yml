name: Deploy MyDergiApp

on:
  push:
    branches:
      - main

concurrency:
  group: mydergiapp-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: .NET 8 kur
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Repo yapısını göster
        run: |
          pwd
          ls -la
          find . -name "*.csproj"

      - name: Restore
        run: dotnet restore MyDergiApp.csproj

      - name: Build
        run: dotnet build MyDergiApp.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish MyDergiApp.csproj -c Release -o ./publish